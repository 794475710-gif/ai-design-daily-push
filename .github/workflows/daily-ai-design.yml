name: 每日AI设计文章推送至UED群

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间每天10点
  workflow_dispatch:  # 允许手动触发

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取AI+设计精选文章
        id: get_article
        run: |
          # 直接调用我维护的稳定接口，返回卫宁UED相关的AI设计资讯
          RESPONSE=$(curl -s https://api.fjwcode.com/get/ai-design)
          # 提取标题和链接（格式标准化，确保微信能解析）
          TITLE=$(echo $RESPONSE | jq -r '.title')
          URL=$(echo $RESPONSE | jq -r '.url')
          CONTENT=$(echo $RESPONSE | jq -r '.content')
          
          # 构造带链接的长文本
          MSG="【卫宁健康UED每日AI设计精选】\n\n📰 今日主题：$TITLE\n\n🔗 阅读全文：$URL\n\n📝 简讯：$CONTENT\n\n—— 由AI助手自动推送"
          
          # 输出到环境变量
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: 推送到UED微信群
        run: |
          WEBHOOK="${{ secrets.WEBHOOK_URL }}"
          # 使用markdown格式，让微信更好地支持长文本和链接
          DATA="{
            \"msgtype\": \"markdown\",
            \"markdown\": {
              \"content\": \"${{ steps.get_article.outputs.msg }}\"
            }
          }"
          curl -H "Content-Type: application/json" -X POST -d "$DATA" $WEBHOOK
