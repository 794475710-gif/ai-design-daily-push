name: 每日AI设计文章推送至UED群

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间每天10点
  workflow_dispatch:  # 允许手动触发

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 构造推送内容
        id: build_msg
        run: |
          # 构造单行消息，避免YAML多行缩进问题
          MSG="【卫宁健康UED每日AI设计精选】 📰 今日主题：AI赋能医疗UI设计 🔗 阅读全文：https://www.uisdc.com/ai-design-trends 📝 简讯：AI辅助设计工具正在大幅提升医疗产品的设计与开发效率。 —— 由AI助手自动推送"
          echo "MSG=$MSG" >> $GITHUB_OUTPUT

      - name: 推送到UED微信群
        run: |
          # 获取消息内容
          MSG="${{ steps.build_msg.outputs.MSG }}"
          # 你的企业微信机器人Webhook
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b11bdccd-3062-496d-a285-10142b4a7e5a"
          # 构造JSON数据
          DATA="{\"msgtype\": \"text\", \"text\": {\"content\": \"$MSG\"}}"
          # 发送请求
          curl -s -X POST -H "Content-Type: application/json" -d "$DATA" --fail "$WEBHOOK"
