name: 每日AI设计文章推送至UED群

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间每天10点
  workflow_dispatch:  # 允许手动触发

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取AI设计文章
        id: get_article
        run: |
          # 用更稳定的方式获取示例文章（你也可以替换成真实数据源）
          TITLE="AI在医疗UI设计中的应用趋势"
          URL="https://example.com/ai-medical-design"
          CONTENT="本文探讨了AI如何优化医疗产品的交互体验，提升卫宁健康UED设计效率。"
          
          # 构造纯文本消息（微信原生支持链接识别）
          MSG="【卫宁健康UED每日AI设计精选】
          
📰 今日主题：$TITLE
🔗 阅读全文：$URL
📝 简讯：$CONTENT

—— 由AI助手自动推送"
          
          # 写入环境变量（避免JSON转义问题）
          echo "$MSG" > msg.txt

      - name: 推送到UED微信群
        run: |
          # 从文件读取消息内容
          MSG=$(cat msg.txt)
          # 你的Webhook地址（已替换为你提供的地址）
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b11bdccd-3062-496d-a285-10142b4a7e5a"
          # 构造纯文本格式消息（最稳定）
          DATA="{
            \"msgtype\": \"text\",
            \"text\": {
              \"content\": \"$MSG\"
            }
          }"
          # 发送请求
          curl -H "Content-Type: application/json" -X POST -d "$DATA" "$WEBHOOK"
