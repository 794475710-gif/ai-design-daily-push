name: 每日AI设计文章推送至UED群(最终对齐版)

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间每天10点
  workflow_dispatch:  # 允许手动触发

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 构造消息
        id: build_msg
        run: |
          # ====================== 1. 文章配置 ======================
          TITLE1="AI赋能医疗UI/UX设计实战指南"
          URL1="https://www.uisdc.com/ai-ux-design"
          CONTENT1="聚焦AI辅助设计工具在医疗软件界面设计中的落地流程与最佳实践，卫宁健康UED团队可重点参考。"
          
          TITLE2="Figma AI 提升设计效率全攻略"
          URL2="https://www.figma.com/blog/category/ai/"
          CONTENT2="利用Figma AI插件快速生成医疗产品原型，自动化标注与切图，大幅提升设计与开发协同效率。"
          
          TITLE3="AIGC时代的医疗产品设计趋势"
          URL3="https://www.infoq.cn/search?q=AI%20%E5%8C%BB%E7%96%97%20%E8%AE%BE%E8%AE%A1"
          CONTENT3="人工智能与医疗设计的深度融合，从交互体验到智能辅助，探索下一代医疗产品体验。"

          # ====================== 2. 轮播逻辑 ======================
          HOUR=$(date +%H)
          if [ $HOUR -lt 8 ]; then
            TITLE="$TITLE1"; URL="$URL1"; CONTENT="$CONTENT1"
          elif [ $HOUR -lt 16 ]; then
            TITLE="$TITLE2"; URL="$URL2"; CONTENT="$CONTENT2"
          else
            TITLE="$TITLE3"; URL="$URL3"; CONTENT="$CONTENT3"
          fi

          # ====================== 3. 完全匹配图中行间距 ======================
          # 用 \n\n 分隔大标题与内容，内部用 \n 分隔行，和你截图完全一致
          MSG="【UED每日AI设计精选】\n\n今日主题：$TITLE\n阅读全文：$URL\n简讯：$CONTENT"
          
          echo "MSG=$MSG" >> $GITHUB_OUTPUT

      - name: 推送（纯文本格式，保证链接可点击+行间距匹配）
        run: |
          MSG="${{ steps.build_msg.outputs.MSG }}"
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b11bdccd-3062-496d-a285-10142b4a7e5a"
          
          # 纯文本格式，和你截图的排版完全一致
          DATA="{\"msgtype\": \"text\", \"text\": {\"content\": \"$MSG\"}}"
          
          curl -s --max-time 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            "$WEBHOOK"
          
          echo "✅ 对齐版推送成功！"
