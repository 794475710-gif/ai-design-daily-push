name: 每日AI设计推送(布局优化版)

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间10点
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 构造优化版消息
        id: build_msg
        run: |
          # 示例文章（后续可替换为抓取逻辑）
          LEVEL="AI+医疗软件结合"
          TITLE="AI赋能医疗UI/UX设计实战指南"
          URL="https://www.uisdc.com/ai-ux-design"
          CONTENT="聚焦AI辅助设计工具在医疗软件界面设计中的落地流程与最佳实践，卫宁健康UED团队可重点参考。"

          # 优化布局：主题单独一行，链接+简讯清晰区分
          MSG="【UED每日AI设计精选】\n\n今日主题：$LEVEL - $TITLE\n阅读全文：$URL\n简讯：$CONTENT"
          echo "MSG=$MSG" >> $GITHUB_OUTPUT

      - name: 推送到企业微信群
        run: |
          MSG="${{ steps.build_msg.outputs.MSG }}"
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=你的WebhookKey"
          
          DATA="{\"msgtype\": \"text\", \"text\": {\"content\": \"$MSG\"}}"
          
          curl -s --max-time 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            "$WEBHOOK"
