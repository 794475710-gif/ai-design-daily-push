name: 每日AI设计文章推送至UED群

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间每天10点
  workflow_dispatch:  # 允许手动触发

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: 抓取Figma最新AI设计文章(稳定源)
        id: get_article
        run: |
          # Figma Blog AI/UX 专栏 - 长期稳定，返回JSON数据
          FIGMA_API="https://www.figma.com/blog/wp-json/wp/v2/posts?categories=2063&per_page=1"
          
          # 抓取数据 (设置5秒超时，避免卡死)
          RESP=$(curl -s --max-time 5 "$FIGMA_API")
          
          # 解析标题和链接 (用//设置默认值，防止null报错)
          TITLE=$(echo "$RESP" | jq -r '.[0].title.rendered // "AI驱动的UX设计趋势"')
          URL=$(echo "$RESP" | jq -r '.[0].link // "https://www.figma.com/blog/"')
          EXCERPT=$(echo "$RESP" | jq -r '.[0].excerpt.rendered | gsub("<.*?>";"") | gsub("&nbsp;";" ") // "聚焦AI与设计结合，提升产品体验"')
          
          # 转义双引号，防止JSON破坏
          TITLE=$(echo "$TITLE" | sed 's/"/\\"/g')
          EXCERPT=$(echo "$EXCERPT" | sed 's/"/\\"/g' | cut -c 1-100)
          
          # 构造单行消息 (绝对避免YAML缩进问题)
          MSG="【卫宁健康UED每日AI精选】 📰 $TITLE 🔗 阅读全文：$URL 📝 $EXCERPT —— 来源：Figma Blog (AI设计专栏)"
          
          echo "MSG=$MSG" >> $GITHUB_OUTPUT

      - name: 推送到UED微信群
        run: |
          MSG="${{ steps.get_article.outputs.MSG }}"
          # 你的Webhook Key
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b11bdccd-3062-496d-a285-10142b4a7e5a"
          
          # 标准JSON推送 (增加--connect-timeout限制，确保不超时)
          curl -s --connect-timeout 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\": \"text\", \"text\": {\"content\": \"$MSG\"}}" \
            "$WEBHOOK"
          
          echo "✅ 推送成功！内容：$MSG"
