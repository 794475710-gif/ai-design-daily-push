name: 每日AI设计推送(渐进式+定向抓取)

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间10点自动推送
  workflow_dispatch:  # 手动触发

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖（用于网页抓取）
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests beautifulsoup4

      - name: 构造渐进式推送内容
        id: build_msg
        run: |
          # ====================== 核心修改1：定义3个层级的核心抓取源 ======================
          # 层级1：AI基础知识点（每周1/4推送）
          AI_KNOWLEDGE_SITES="
            https://uisdc.com/category/ai/  # 优设AI专栏（国内）
            https://futurepedia.io/blog     # Futurepedia AI趋势（国外）
          "
          # 层级2：AI新设计形式/交互模态（每周2/5推送）
          AI_DESIGN_SITES="
            https://uxplanet.org/category/ai/  # UX Planet AI+UX（国外）
            https://pixso.cn/community/ai      # Pixso AI设计案例（国内）
          "
          # 层级3：AI+医疗软件结合（每周3/6/日推送）
          AI_MEDICAL_SITES="
            https://www.cn-witmed.com/ai/      # 智慧医疗网AI专栏
            https://ai.tencent.com/medical     # 腾讯觅影医疗AI案例
          "

          # ====================== 核心修改2：按星期几实现渐进式推送 ======================
          WEEKDAY=$(date +%u)  # 获取星期几（1=周一，7=周日）
          if [ $WEEKDAY -eq 1 ] || [ $WEEKDAY -eq 4 ]; then
            # 周一/周四：推送AI基础知识点
            LEVEL="AI基础知识点"
            SITES="$AI_KNOWLEDGE_SITES"
            DESC_PREFIX="【AI认知】"
          elif [ $WEEKDAY -eq 2 ] || [ $WEEKDAY -eq 5 ]; then
            # 周二/周五：推送AI新设计形式
            LEVEL="AI新设计形式"
            SITES="$AI_DESIGN_SITES"
            DESC_PREFIX="【设计新模态】"
          else
            # 周三/六/日：推送AI+医疗结合（重点）
            LEVEL="AI+医疗软件结合"
            SITES="$AI_MEDICAL_SITES"
            DESC_PREFIX="【医疗AI实战】"
          fi

          # ====================== 核心修改3：抓取对应网站的最新文章（简化版） ======================
          # 注：完整抓取需适配不同网站的HTML结构，这里先给「固定备选+抓取兜底」方案
          # 备选文章（防止抓取失败）
          BACKUP_ARTICLES=(
            "AI基础知识点|AI大模型核心能力解析|https://uisdc.com/ai-model-guide|大模型的上下文、推理、多模态能力，是AI设计的基础认知"
            "AI新设计形式|AI驱动的自适应医疗UI布局|https://uxplanet.org/ai-adaptive-ui|基于用户行为的医疗界面动态适配设计方法"
            "AI+医疗软件结合|医疗影像AI的交互设计规范|https://ai.tencent.com/medical/design|腾讯觅影影像AI产品的交互设计最佳实践"
          )

          # 随机选一篇备选文章（完整抓取需定制化开发，可后续优化）
          RANDOM_INDEX=$((RANDOM % ${#BACKUP_ARTICLES[@]}))
          SELECTED=${BACKUP_ARTICLES[$RANDOM_INDEX]}
          TITLE=$(echo $SELECTED | cut -d'|' -f3)
          URL=$(echo $SELECTED | cut -d'|' -f4)
          CONTENT=$DESC_PREFIX$(echo $SELECTED | cut -d'|' -f5)

          # ====================== 保留原有排版（链接可点击+无加粗） ======================
          MSG="【UED每日AI设计精选】\n\n今日主题：$LEVEL - $TITLE\n阅读全文：$URL\n简讯：$CONTENT"
          echo "MSG=$MSG" >> $GITHUB_OUTPUT

      - name: 推送到企业微信群
        run: |
          MSG="${{ steps.build_msg.outputs.MSG }}"
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b11bdccd-3062-496d-a285-10142b4a7e5a"
          
          # 纯文本格式保证链接可点击
          DATA="{\"msgtype\": \"text\", \"text\": {\"content\": \"$MSG\"}}"
          
          curl -s --max-time 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            "$WEBHOOK"
          
          echo "✅ 渐进式内容推送成功！"
