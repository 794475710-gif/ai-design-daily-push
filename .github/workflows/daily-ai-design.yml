name: 每日AI设计推送(每日2篇-设计+医疗-稳定兜底版)

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间每天10:00自动推送
  workflow_dispatch:     # 手动触发测试

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 构造2篇稳定文章消息
        id: build_msg
        run: |
          python3 - <<EOF
          import random

          # ====================== 设计类文章库 ======================
          DESIGN_ARTICLES = [
              {
                  "title": "AI驱动的自适应医疗UI布局",
                  "url": "https://uxplanet.org/ai-adaptive-ui",
                  "desc": "基于用户行为的医疗界面动态适配设计方法，适配不同科室医生的操作习惯"
              },
              {
                  "title": "多模态交互在医疗产品中的应用",
                  "url": "https://uisdc.com/ai-multimodal",
                  "desc": "语音+手势+视觉多模态交互，提升医护人员操作效率与患者体验"
              },
              {
                  "title": "AI辅助的医疗界面组件自动生成",
                  "url": "https://pixso.cn/ai-component",
                  "desc": "利用AI快速生成符合医疗规范的表单、图表等UI组件"
              }
          ]

          # ====================== 医疗类文章库 ======================
          MEDICAL_ARTICLES = [
              {
                  "title": "医疗影像AI交互设计规范",
                  "url": "https://ai.tencent.com/medical/design",
                  "desc": "腾讯觅影影像AI产品的交互设计最佳实践，兼顾专业性与易用性"
              },
              {
                  "title": "AI辅助临床决策系统的界面设计",
                  "url": "https://www.cn-witmed.com/ai/cdss",
                  "desc": "如何在CDSS系统中平衡AI推荐与医生的临床判断自主权"
              },
              {
                  "title": "医疗大模型在病历结构化中的应用",
                  "url": "https://yiducloud.com/ai-nlp",
                  "desc": "利用大模型将自由文本病历结构化，提升医疗数据利用效率"
              }
          ]

          # 随机各选一篇
          design = random.choice(DESIGN_ARTICLES)
          medical = random.choice(MEDICAL_ARTICLES)

          # 拼接消息
          msg = "【UED每日AI设计精选】\n\n📌 第一篇：AI新设计形式\n标题：" + design["title"] + "\n阅读全文：" + design["url"] + "\n简讯：【AI新设计形式】" + design["desc"] + "\n\n📌 第二篇：AI+医疗软件结合\n标题：" + medical["title"] + "\n阅读全文：" + medical["url"] + "\n简讯：【AI+医疗软件结合】" + medical["desc"]

          # 兼容新版GitHub Actions输出方式（避免弃用警告）
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'MSG={msg}\n')
          EOF

      - name: 推送到企业微信群
        run: |
          MSG="${{ steps.build_msg.outputs.MSG }}"
          WEBHOOK="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b11bdccd-3062-496d-a285-10142b4a7e5a"
          
          DATA="{\"msgtype\": \"text\", \"text\": {\"content\": \"$MSG\"}}"
          
          curl -s --max-time 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            "$WEBHOOK"
          
          echo "✅ 每日2篇文章推送成功！"
